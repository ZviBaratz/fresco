name: Lint

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  golangci-lint:
    name: golangci-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.x'
          check-latest: true
      # Runs the pinned golangci-lint via `go run` — the exact invocation
      # verified green against this tree locally. It reads .golangci.yml.
      # (Swappable for golangci/golangci-lint-action later if the one-time
      # build cost becomes a concern; setup-go's build cache keeps it modest.)
      - name: golangci-lint
        run: go run github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.12.2 run ./...
