name: Release

on:
  push:
    tags: ['v*']

# Least privilege: creating the Release and uploading its assets needs only
# write access to repository contents.
permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  goreleaser:
    name: goreleaser
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0 # GoReleaser needs full history and tags

      - uses: actions/setup-go@v7
        with:
          go-version: '1.26.x'
          check-latest: true

      - name: Extract this tag's release notes from CHANGELOG.md
        run: |
          version="${GITHUB_REF_NAME#v}"
          awk -v ver="$version" '
            $0 ~ "^## \\[" ver "\\]" { grab = 1; next }
            grab && /^## \[/ { exit }
            grab { print }
          ' CHANGELOG.md > "$RUNNER_TEMP/release-notes.md"
          echo "----- release notes for $version -----"
          cat "$RUNNER_TEMP/release-notes.md"

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: '~> v2'
          args: release --clean --release-notes=${{ runner.temp }}/release-notes.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
