name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: test (${{ matrix.os }}, go ${{ matrix.go }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        go: ['1.25.x', '1.26.x']
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go }}
          check-latest: true

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      # gofmt on Linux only — avoids CRLF false positives on Windows checkouts.
      - name: Gofmt
        if: runner.os == 'Linux'
        run: |
          unformatted="$(gofmt -l .)"
          if [ -n "$unformatted" ]; then
            echo "These files are not gofmt-ed:"; echo "$unformatted"
            exit 1
          fi

      - name: Test
        run: go test ./... -coverprofile=coverage.out

      # Publish the coverage profile once, from the canonical combination.
      - name: Coverage summary
        if: runner.os == 'Linux' && matrix.go == '1.26.x'
        run: go tool cover -func=coverage.out | tail -1 | tee -a "$GITHUB_STEP_SUMMARY"

      - name: Upload coverage
        if: runner.os == 'Linux' && matrix.go == '1.26.x'
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.out
          if-no-files-found: error

      # Publish to Codecov for the live README badge and per-PR coverage deltas.
      # fail_ci_if_error stays false so a Codecov outage never reds the build;
      # the token is a repo secret (uploads are best-effort until it is set).
      - name: Upload coverage to Codecov
        if: runner.os == 'Linux' && matrix.go == '1.26.x'
        uses: codecov/codecov-action@v5
        with:
          files: coverage.out
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

  race:
    name: race detector
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.x'
          check-latest: true
      # No coverage here: -race with atomic coverage instrumentation makes the
      # numeric field tests pathologically slow. -race alone runs in seconds and
      # exercises the mutex-guarded LUT cache via TestRenderSplashFieldConcurrent.
      - name: Test with the race detector
        run: go test ./... -race
