# GoReleaser builds and publishes the cmd/fresco binary on each vX.Y.Z tag.
# Docs: https://goreleaser.com. Validate locally with `goreleaser check` and
# `goreleaser release --snapshot --clean` — never a real `release` by hand; the
# tag push does that in CI (see .github/workflows/release.yml).
version: 2

project_name: fresco

before:
  hooks:
    - go mod download # populate the module cache; does not modify go.mod/go.sum

builds:
  - id: fresco
    main: ./cmd/fresco
    binary: fresco
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X main.version={{ .Version }}
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64]

archives:
  - id: fresco
    formats: [tar.gz]
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - LICENSE
      - README.md
      - CHANGELOG.md

checksum:
  name_template: checksums.txt

changelog:
  disable: true # release notes come from CHANGELOG.md via --release-notes, not git log

release:
  prerelease: auto # a -rc / -beta tag publishes as a GitHub pre-release
