# GoReleaser builds and publishes the cmd/fresco binary on each vX.Y.Z tag.
# Docs: https://goreleaser.com. Validate locally with `goreleaser check` and
# `goreleaser release --snapshot --clean` — never a real `release` by hand; the
# tag push does that in CI (see .github/workflows/release.yml).
version: 2

project_name: fresco

before:
  hooks:
    - go mod download # populate the module cache; does not modify go.mod/go.sum

builds:
  - id: fresco
    main: ./cmd/fresco
    binary: fresco
    env:
      - CGO_ENABLED=0
    ldflags:
      # {{ .Tag }} keeps the leading `v` so a prebuilt binary reports the same
      # string as `go install ...@vX.Y.Z` (the debug.BuildInfo fallback).
      - -s -w -X main.version={{ .Tag }}
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64]

archives:
  - id: fresco
    formats: [tar.gz]
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - LICENSE
      - README.md
      - CHANGELOG.md

checksum:
  name_template: checksums.txt

# The release body comes from the tag's CHANGELOG.md section, which the release
# workflow extracts and passes via `--release-notes`. Do NOT set
# `changelog.disable: true`: GoReleaser reads the --release-notes file *inside*
# the changelog pipe, so disabling it silently drops the notes and publishes an
# EMPTY release body (this bit v1.3.0). With the changelog left enabled,
# --release-notes wins at release time; snapshot/manual builds without the flag
# just fall back to a harmless git-log changelog.

release:
  prerelease: auto # a -rc / -beta tag publishes as a GitHub pre-release
